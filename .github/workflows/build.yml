name: Build

on:
  push:
    branches: [main, linux-build, ci-cd]
    tags: ["v*"]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  build-linux:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libglib2.0-dev libpango1.0-dev \
            libcairo2-dev libatk1.0-dev libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - run: pnpm tauri build --bundles deb,rpm,appimage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: src-tauri/target/release/bundle/

  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-rust@v1
        with:
          toolchain: stable
      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: pnpm tauri build --bundles dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: src-tauri/target/release/bundle/

  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-rust@v1
        with:
          toolchain: stable
      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - run: pnpm tauri build --bundles msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: src-tauri/target/release/bundle/

  publish:
    if: github.event_name == 'release'
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: bundles/linux
      - uses: actions/download-artifact@v4
        with:
          name: macos-bundles
          path: bundles/macos
      - uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: bundles/windows
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            bundles/**/*
